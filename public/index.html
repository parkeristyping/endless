<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>endless</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="splash" onclick="startAudio()">
    <div class="splash-content">
      <h1>endless</h1>
      <p>Click anywhere to begin</p>
    </div>
  </div>

  <div id="app" class="hidden">
    <header>
      <h1>endless</h1>
      <div id="status">
        <span id="theme"></span>
      </div>
    </header>

    <main>
      <div id="editor-container">
        <strudel-editor id="strudel"></strudel-editor>
      </div>

      <div id="chat-panel">
        <div id="plan-section">
          <h2>Plan</h2>
          <p id="plan-text"></p>
        </div>
        <div id="chat-header">
          <h2>Suggest</h2>
          <p class="hint">How should the song evolve? Your suggestions influence the next update.</p>
        </div>
        <div id="suggestions-list"></div>
        <form id="chat-form">
          <input
            type="text"
            id="chat-input"
            placeholder="e.g. make it more jazzy, add reverb, speed it up..."
            maxlength="280"
            autocomplete="off"
          />
          <button type="submit">Send</button>
        </form>
      </div>
    </main>
  </div>

  <script src="https://unpkg.com/@strudel/repl@latest"></script>
  <script src="app.js"></script>
</body>
</html>
